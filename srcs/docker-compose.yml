services:
  mariadb:
    volumes:
      - mariadb:/var/lib/mysql
    container_name: mariadb
    secrets:
      - db_password
      - db_root_password
    build:
      context: requirements/mariadb
      dockerfile: Dockerfile
    env_file:
      - .env
    networks:
      - inception
    restart: on-failure

  nginx:
    container_name: nginx
    build:
      context: requirements/nginx
      dockerfile: Dockerfile
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    depends_on:
      - wordpress
    env_file:
      - .env
    ports:
      - "443:443"
    restart: on-failure


  wordpress:
    container_name: wordpress
    build:
      context: requirements/wordpress
      dockerfile: Dockerfile
    secrets:
      - db_password
      - db_root_password
    env_file:
      - .env
    volumes:
      - wordpress:/var/www/html
    networks:
      - inception
    depends_on:
      - mariadb
    expose:
      - "9000"
    restart: on-failure


volumes:
  wordpress:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/axelpeti/data/wordpress

  mariadb:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/axelpeti/data/mariadb

networks:
  inception:
    driver: bridge

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt

